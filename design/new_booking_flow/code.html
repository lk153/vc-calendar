<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col pb-safe antialiased">
<!-- TopAppBar -->
<header class="sticky top-0 z-50 flex justify-between items-center w-full px-4 h-16 bg-surface/90 backdrop-blur-md border-b border-surface-variant">
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="font-manrope font-bold text-lg text-on-surface">New Booking</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined text-on-surface">close</span>
</button>
</header>
<main class="flex-1 overflow-y-auto px-margin_mobile py-md flex flex-col gap-lg">
<!-- Event Details Section -->
<section class="flex flex-col gap-md">
<div>
<label class="block font-body-sm font-bold text-on-surface mb-base" for="event-title">Event Title</label>
<input class="w-full h-12 px-sm rounded border border-outline-variant bg-surface focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all text-body-md placeholder:text-outline" id="event-title" placeholder="e.g., Q3 Planning Session" type="text"/>
</div>
<div>
<label class="block font-body-sm font-bold text-on-surface mb-base" for="event-desc">Description (Optional)</label>
<textarea class="w-full p-sm rounded border border-outline-variant bg-surface focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all text-body-md resize-none placeholder:text-outline" id="event-desc" placeholder="Add context or agenda..." rows="3"></textarea>
</div>
</section>
<!-- Date & Time Section -->
<section class="bg-surface p-md rounded-xl border border-surface-variant shadow-sm flex flex-col gap-md">
<div class="flex items-center justify-between border-b border-surface-variant pb-md">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-on-surface-variant">schedule</span>
<span class="font-body-md text-on-surface">All-day</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-outline-variant after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<div class="grid grid-cols-2 gap-md">
<div class="flex flex-col gap-base relative">
<label class="font-label-caps text-on-surface-variant uppercase">Date</label>
<button class="flex items-center justify-between w-full h-12 px-sm rounded border border-outline-variant bg-surface hover:bg-surface-container-low transition-colors text-body-md text-left focus:border-primary focus:ring-2 focus:ring-primary/20">
<span class="truncate">Oct 24, 2023</span>
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">calendar_today</span>
</button>
</div>
<div class="flex flex-col justify-end">
<div class="h-12 flex items-center justify-center bg-surface-container-low rounded border border-surface-variant text-body-sm font-medium text-on-surface-variant">
                        1h 30m
                    </div>
</div>
</div>
<div class="grid grid-cols-2 gap-md pt-sm">
<div class="flex flex-col gap-base">
<label class="font-label-caps text-on-surface-variant uppercase">Start Time</label>
<button class="flex items-center justify-between w-full h-12 px-sm rounded border border-outline-variant bg-surface hover:bg-surface-container-low transition-colors text-body-md text-left focus:border-primary focus:ring-2 focus:ring-primary/20">
<span>10:00 AM</span>
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">expand_more</span>
</button>
</div>
<div class="flex flex-col gap-base">
<label class="font-label-caps text-on-surface-variant uppercase">End Time</label>
<button class="flex items-center justify-between w-full h-12 px-sm rounded border border-outline-variant bg-surface hover:bg-surface-container-low transition-colors text-body-md text-left focus:border-primary focus:ring-2 focus:ring-primary/20">
<span>11:30 AM</span>
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">expand_more</span>
</button>
</div>
</div>
</section>

<div class="flex items-center justify-between">
<label class="font-h3 font-manrope font-semibold text-on-background">Location</label>
<button class="text-body-sm text-primary font-medium hover:underline">Browse Map</button>
</div>
<button class="w-full flex items-start gap-sm p-md bg-surface rounded-xl border border-surface-variant hover:border-primary/50 transition-all text-left shadow-sm active:scale-[0.99] focus:outline-none focus:ring-2 focus:ring-primary/20">
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary text-[20px]">meeting_room</span>
</div>
<div class="flex-1 min-w-0">
<div class="flex items-center justify-between mb-1">
<span class="font-body-md font-medium text-on-surface truncate">Boardroom A</span>
<span class="font-body-sm text-on-surface-variant whitespace-nowrap">Cap: 12</span>
</div>
<p class="font-body-sm text-on-surface-variant truncate">Level 4, North Wing</p>

<span class="material-symbols-outlined text-[14px]">videocam</span> Video
                        </span>
<span class="inline-flex items-center gap-1 px-2 py-1 rounded bg-surface-container-low text-label-caps text-on-surface-variant whitespace-nowrap">
<span class="material-symbols-outlined text-[14px]">tv</span> Projector
                        </span>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant mt-2">chevron_right</span>
</button>
</section>

</div>
<div class="flex flex-col gap-xs">
<div class="flex items-center justify-between p-sm rounded bg-surface border border-surface-variant">

<div class="w-8 h-8 rounded-full bg-primary/20 text-primary flex items-center justify-center font-bold text-body-sm">
