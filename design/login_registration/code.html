<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>Scheduler - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&amp;family=Inter:wght@400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#059669",
                        "on-primary": "#ffffff",
                        "primary-container": "#d1fae5",
                        "on-primary-container": "#064e3b",
                        "secondary": "#475569",
                        "on-secondary": "#ffffff",
                        "secondary-container": "#f1f5f9",
                        "on-secondary-container": "#0f172a",
                        "background": "#f8fafc",
                        "on-background": "#0f172a",
                        "surface": "#ffffff",
                        "on-surface": "#0f172a",
                        "surface-variant": "#f1f5f9",
                        "on-surface-variant": "#475569",
                        "outline": "#cbd5e1",
                        "outline-variant": "#e2e8f0",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f8fafc",
                        "surface-container": "#f1f5f9",
                        "surface-container-high": "#e2e8f0",
                        "error": "#ef4444",
                        "on-error": "#ffffff",
                        "on-primary-fixed": "#064e3b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin_mobile": "16px",
                        "xs": "8px",
                        "margin_desktop": "40px",
                        "gutter": "16px",
                        "md": "16px",
                        "xl": "32px",
                        "base": "4px",
                        "sm": "12px",
                        "lg": "24px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "h1": ["Manrope"],
                        "h2": ["Manrope"],
                        "h3": ["Manrope"],
                        "body-sm": ["Inter"],
                        "label-caps": ["Inter"],
                        "button": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400"}],
                        "h1": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "h2": ["24px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "h3": ["20px", {"lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "600"}],
                        "body-sm": ["14px", {"lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400"}],
                        "label-caps": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "button": ["16px", {"lineHeight": "1", "letterSpacing": "0.01em", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-margin_mobile md:p-margin_desktop antialiased">
<div class="w-full max-w-md bg-surface rounded-xl shadow-[0_4px_20px_rgba(15,23,42,0.04)] border border-surface-variant overflow-hidden flex flex-col">
<div class="h-32 bg-primary-container relative flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1;">calendar_month</span>
<div class="absolute bottom-0 left-0 w-full h-8 bg-gradient-to-t from-surface to-transparent"></div>
</div>
<div class="p-lg md:p-xl flex flex-col gap-lg flex-grow">
<div class="text-center">
<h1 class="font-h2 text-h2 text-on-surface mb-base">Scheduler</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Welcome back. Please log in to continue.</p>
</div>
<form class="flex flex-col gap-md">
<div class="flex flex-col gap-base">
<label class="font-body-sm text-body-sm font-semibold text-on-surface" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-lg">mail</span>
</div>
<input class="w-full pl-xl pr-sm py-sm bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary font-body-md text-body-md text-on-surface transition-shadow" id="email" name="email" placeholder="executive@company.com" required="" type="email"/>
</div>
</div>
<div class="flex flex-col gap-base">
<div class="flex justify-between items-center">
<label class="font-body-sm text-body-sm font-semibold text-on-surface" for="password">Password</label>
<a class="font-body-sm text-body-sm text-primary hover:underline focus:outline-none focus:ring-2 focus:ring-primary rounded-sm" href="#">Forgot password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-lg">lock</span>
</div>
<input class="w-full pl-xl pr-sm py-sm bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary font-body-md text-body-md text-on-surface transition-shadow" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="flex items-center gap-sm mt-xs">
<input class="w-5 h-5 rounded DEFAULT text-primary border-outline-variant focus:ring-primary focus:ring-offset-surface" id="remember" name="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer select-none" for="remember">Remember me for 30 days</label>
</div>
<button class="mt-sm w-full bg-primary text-on-primary font-button text-button py-sm px-lg rounded-lg hover:bg-on-primary-fixed focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface transition-colors flex items-center justify-center gap-sm" type="submit">
                    Log In
                    <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</form>
<div class="relative flex items-center my-xs">
<div class="flex-grow border-t border-surface-variant"></div>
<span class="flex-shrink-0 mx-sm text-on-surface-variant font-label-caps text-label-caps uppercase">Or continue with</span>
<div class="flex-grow border-t border-surface-variant"></div>
</div>
<button class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface font-button text-button py-sm px-lg rounded-lg hover:bg-surface-container focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface transition-colors flex items-center justify-center gap-sm" type="button">
<svg class="w-5 h-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                Google
            </button>
</div>
<div class="bg-surface-container-low p-md text-center border-t border-surface-variant mt-auto">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary font-semibold hover:underline focus:outline-none focus:ring-2 focus:ring-primary rounded-sm" href="#">Sign up here</a>
</p>
</div>
</div>
</body></html>
